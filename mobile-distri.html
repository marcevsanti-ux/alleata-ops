<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A2540">
<title>Alleata · Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0f4f8;--surface:#fff;--header:#0A2540;--border:#e2e8f0;
  --teal:#1dbf8e;--blue:#4a9eff;--orange:#f59e0b;--red:#ef4444;--green:#10b981;
  --text:#0f172a;--muted:#64748b;--radius:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;}

/* HEADER */
.header{background:var(--header);color:#fff;padding:0 16px;height:56px;padding-top:env(safe-area-inset-top,0px);height:calc(56px + env(safe-area-inset-top,0px));display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:10px;position:sticky;top:0;z-index:200;}
.h-logo{font-size:16px;font-weight:900;color:var(--teal);}
.h-name{font-size:12px;font-weight:700;color:var(--teal);background:rgba(29,191,142,.15);border:1px solid rgba(29,191,142,.3);padding:3px 10px;border-radius:99px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* STATS */
.stats{background:var(--header);display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.08);}
.stat{flex:1;padding:10px 8px 14px;text-align:center;}
.stat-num{font-size:22px;font-weight:900;line-height:1;}
.stat-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.orange{color:var(--orange);}
.blue{color:var(--blue);}
.green{color:var(--green);}

/* TABS */
.tabs{background:var(--header);display:flex;position:sticky;top:calc(56px + env(safe-area-inset-top,0px));z-index:199;border-bottom:1px solid rgba(255,255,255,.08);}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* CONTENT */
.content{padding:12px;padding-bottom:calc(env(safe-area-inset-bottom,0px)+16px);}

/* FILTROS */
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.fc{flex-shrink:0;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;}
.fc.active{background:var(--teal);color:#fff;border-color:var(--teal);}

/* OT CARDS */
.ot-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.ot-card.c-ok{border-left:4px solid var(--green);}
.ot-card.c-cont{border-left:4px solid var(--blue);}
.ot-card.c-noen{border-left:4px solid var(--red);}
.ot-card.c-reti{border-left:4px solid var(--orange);}
.ot-head{padding:12px 14px 8px;}
.ot-num{font-size:13px;font-weight:800;color:var(--teal);}
.ot-nom{font-size:15px;font-weight:800;color:var(--text);margin:2px 0;}
.ot-cta{font-size:11px;color:var(--muted);}
.ot-body{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px;}
.ot-chip{font-size:11px;color:var(--muted);background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:3px 8px;}
.ot-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.badge-pend{background:#fff7ed;color:#c2410c;}
.badge-cont{background:#eff6ff;color:#1d4ed8;}
.badge-noen{background:#fef2f2;color:#dc2626;}
.badge-reti{background:#fffbeb;color:#b45309;}
.badge-exit{background:#f0fdf4;color:#16a34a;}
.badge-roll{background:#f5f3ff;color:#7c3aed;}
.ot-obs{font-size:11px;color:var(--muted);font-style:italic;padding:0 14px 8px;}

/* MAPS + ACCION */
.ot-actions{display:flex;gap:8px;padding:8px 14px 12px;}
.btn-maps{flex:1;background:#4285F4;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-accion{flex:2;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-accion.done{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}

/* MODAL ESTADO */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
#modal.open{display:flex;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px)+20px);width:100%;max-height:80dvh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
.modal-ot{font-size:13px;font-weight:800;color:var(--teal);margin-bottom:2px;}
.modal-nom{font-size:16px;font-weight:800;margin-bottom:16px;}
.modal-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.estados-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.est-btn{padding:12px 8px;border:2px solid var(--border);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;background:#fff;transition:all .15s;}
.est-btn.sel{border-color:var(--teal);background:rgba(29,191,142,.08);color:var(--teal);}
.modal-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;}
.modal-input:focus{border-color:var(--teal);}
.btn-guardar{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:14px;}
.btn-cerrar{width:100%;background:none;border:none;color:var(--muted);padding:10px;font-size:14px;cursor:pointer;font-family:inherit;}

/* RUTA */
.ruta-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.ruta-num{width:28px;height:28px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.ruta-info{flex:1;min-width:0;}
.ruta-ot{font-size:12px;font-weight:800;color:var(--teal);}
.ruta-nom{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ruta-city{font-size:11px;color:var(--muted);}
.ruta-dist{font-size:13px;font-weight:800;color:var(--muted);flex-shrink:0;}

/* EMPTY / LOADING */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.spin{display:inline-block;width:28px;height:28px;border:3px solid rgba(29,191,142,.2);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+20px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--header);color:#fff;padding:10px 22px;border-radius:40px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{background:var(--red);}
</style>
</head>
<body>

<div class="header" id="header" style="display:none">
  <div>
    <div class="h-logo">🚚 alleata</div>
    <div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:1px">v1.0.4</div>
  </div>
  <div class="h-name" id="h-name">—</div>
</div>

<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-num orange" id="s-pend">0</div><div class="stat-lbl">Pendientes</div></div>
  <div class="stat"><div class="stat-num blue" id="s-cont">0</div><div class="stat-lbl">Contactadas</div></div>
  <div class="stat"><div class="stat-num green" id="s-exit">0</div><div class="stat-lbl">Exitosas</div></div>
</div>

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" id="tab-ots" onclick="switchTab('ots')">📦 OTs</div>
  <div class="tab" id="tab-ruta" onclick="switchTab('ruta')">🗺️ Ruta</div>
</div>

<div class="content" id="content">
  <div class="empty" id="view-loading">
    <div class="spin"></div>
    <div style="margin-top:14px;font-size:14px;font-weight:600">Cargando...</div>
  </div>
  <div class="empty" id="view-error" style="display:none">
    <div class="empty-icon">❌</div>
    <div id="error-msg" style="font-weight:700">Link inválido</div>
  </div>
  <div id="view-ots" style="display:none"></div>
  <div id="view-ruta" style="display:none"></div>
</div>

<!-- MODAL ESTADO -->
<div id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-ot" id="modal-ot-num"></div>
    <div class="modal-nom" id="modal-ot-nom"></div>
    <div class="modal-lbl">Estado</div>
    <div class="estados-grid">
      <div class="est-btn e-cont" onclick="selEst('Contactado')">📞 Contactado</div>
      <div class="est-btn e-noen" onclick="selEst('No encontrado')">❌ No encontrado</div>
      <div class="est-btn e-reti" onclick="selEst('Confirmado retiro')">📦 Conf. retiro</div>
      <div class="est-btn e-exit" onclick="selEst('Exitoso')">✅ Exitoso</div>
      <div class="est-btn e-roll" onclick="selEst('Rollout')">🔄 Rollout</div>
    </div>
    <div id="fecha-wrap" style="display:none;margin-bottom:12px">
      <div class="modal-lbl">Fecha retiro</div>
      <input class="modal-input" id="modal-fecha" type="date">
    </div>
    <div class="modal-lbl">Observaciones</div>
    <textarea class="modal-input" id="modal-obs" rows="2" placeholder="Opcional..." style="resize:none"></textarea>
    <button class="btn-guardar" onclick="guardarEstado()">Guardar</button>
    <button class="btn-cerrar" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

let D=null,OTS=[],REP={},MID=null,MEST=null,FIL='hoy',TAB='ots';

function toast(m,ok=true){
  const t=document.getElementById('toast');
  t.textContent=m;t.className='show'+(ok?'':' err');
  setTimeout(()=>t.className='',2500);
}

async function init(){
  if(!TOKEN){err('Falta el token en la URL');return;}
  const{data:d}=await sb.from('distribuidores').select('*').eq('id',TOKEN).maybeSingle();
  if(!d){err('Distribuidor no encontrado');return;}
  D=d;
  document.getElementById('h-name').textContent=d.nombre+(d.apellido&&d.apellido!==d.nombre?' '+d.apellido:'');
  document.title='Alleata · '+d.nombre;

  // Leer OTs del cache calculado por el portal OPS
  const{data:distriData}=await sb.from('distribuidores').select('ots_cache,ots_cache_at').eq('id',TOKEN).single();
  const cache=distriData?.ots_cache||[];
  
  // Normalizar cache al formato que usa mobile-distri (campos en minúscula)
  OTS=cache.map(e=>({
    sf_id:e.sf_id||e.OT||'',
    ot:e.OT||'',
    comercio:e.Comercio||e.Cuenta||'',
    cuenta:e.Cuenta||'',
    ciudad:e.Ciudad||'',
    provincia:e.Provincia||'',
    cp:e.CP||'',
    estado:e.Estado||'',
    contacto:e.Contacto||'',
    horario:e.Horario||'',
    direccion_completa:e.Calle||'',
    observaciones:e.Obs||'',
    distKm:e.Dist||null,
  })).sort((a,b)=>(a.distKm??9999)-(b.distKm??9999));

  const{data:reps}=await sb.from('distri_reportes').select('*').eq('distri_id',TOKEN);
  REP={};(reps||[]).forEach(r=>{
    REP[r.sf_id]=r;
    // También indexar por OT para compatibilidad con el cache
    const otObj=OTS.find(o=>o.sf_id===r.sf_id);
    if(otObj)REP[otObj.ot]=r;
  });

  document.getElementById('view-loading').style.display='none';
  document.getElementById('header').style.display='flex';
  document.getElementById('stats').style.display='flex';
  document.getElementById('tabs').style.display='flex';
  stats();
  switchTab('ots');
}

function err(m){
  document.getElementById('view-loading').style.display='none';
  document.getElementById('error-msg').textContent=m;
  document.getElementById('view-error').style.display='flex';
}

function stats(){
  const today=new Date().toISOString().slice(0,10);
  const deHoy=OTS.filter(e=>{
    const rep=REP[e.sf_id]||REP[e.ot];
    return rep?.estado==='Confirmado retiro'&&rep?.fecha_retiro===today;
  });
  const exitosos=OTS.filter(e=>['Exitoso','Rollout'].includes(REP[e.sf_id]?.estado||REP[e.ot]?.estado||''));
  const contactados=OTS.filter(e=>['Contactado','Confirmado retiro'].includes(REP[e.sf_id]?.estado||REP[e.ot]?.estado||''));
  document.getElementById('s-total').textContent=deHoy.length;
  document.getElementById('s-pend').textContent=deHoy.filter(e=>!['Exitoso','Rollout'].includes(REP[e.sf_id]?.estado||REP[e.ot]?.estado||'')).length;
  document.getElementById('s-cont').textContent=contactados.length;
  document.getElementById('s-exit').textContent=exitosos.length;
}

function switchTab(t){
  TAB=t;
  ['ots','ruta'].forEach(x=>{
    document.getElementById('view-'+x).style.display='none';
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  document.getElementById('view-'+t).style.display='block';
  if(t==='ots')renderOts();
  if(t==='ruta')renderRuta();
}

// ── BADGE ──
const BADGE_MAP={
  'Pendiente':'badge-pend ⏳ Pendiente',
  'Contactado':'badge-cont 📞 Contactado',
  'No encontrado':'badge-noen ❌ No encontrado',
  'Confirmado retiro':'badge-reti 📦 Conf. retiro',
  'Exitoso':'badge-exit ✅ Exitoso',
  'Rollout':'badge-roll 🔄 Rollout'
};
function badge(e){const v=(BADGE_MAP[e]||'badge-pend '+e).split(' ');return`<span class="ot-badge ${v[0]}">${v.slice(1).join(' ')}</span>`;}
function cardClass(e){return{'Exitoso':'c-ok','Rollout':'c-ok','Contactado':'c-cont','No encontrado':'c-noen','Confirmado retiro':'c-reti'}[e]||'';}

// ── RENDER OTs ──
function renderOts(){
  const today=new Date().toISOString().slice(0,10);
  
  // Filtros disponibles
  const confirmadas=OTS.filter(e=>{
    const rep=REP[e.sf_id]||REP[e.ot];
    return rep?.estado==='Confirmado retiro';
  });
  const deHoy=confirmadas.filter(e=>{
    const rep=REP[e.sf_id]||REP[e.ot];
    return rep?.fecha_retiro===today;
  });

  const list=FIL==='hoy'?deHoy:FIL==='confirmadas'?confirmadas:OTS;

  const todayLabel=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});

  let html=`<div class="filter-bar">
    <div class="fc ${FIL==='hoy'?'active':''}" onclick="setF('hoy')" style="${FIL!=='hoy'?'border-color:#1dbf8e;color:#1dbf8e':''}">🗓️ Hoja de Ruta hoy (${deHoy.length})</div>
    <div class="fc ${FIL==='confirmadas'?'active':''}" onclick="setF('confirmadas')" style="${FIL!=='confirmadas'?'border-color:#f59e0b;color:#f59e0b':''}">📦 Confirmadas (${confirmadas.length})</div>
    <div class="fc ${FIL==='todas'?'active':''}" onclick="setF('todas')">Todas (${OTS.length})</div>
  </div>`;

  if(FIL==='hoy'){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px">📅 ${todayLabel}</div>`;
  }

  if(!list.length){
    const msg=FIL==='hoy'?'Sin retiros para hoy':FIL==='confirmadas'?'Sin retiros confirmados':'Sin OTs';
    html+=`<div class="empty"><div class="empty-icon">${FIL==='hoy'?'✅':'📦'}</div><div style="font-weight:700">${msg}</div></div>`;
  } else {
    html+=list.map(e=>{
      const rep=REP[e.sf_id],est=rep?.estado||'Pendiente';
      const dir=e.direccion_completa||'',city=e.ciudad||'';
      const mq=encodeURIComponent((dir?dir+' '+city:city)+' Argentina');
      const tel=(e.contacto||'').replace(/\D/g,'');
      const esDone=['Exitoso','Rollout'].includes(est);
      return`<div class="ot-card ${cardClass(est)}">
        <div class="ot-head">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="ot-num">OT #${e.ot||e.sf_id}</div>
              <div class="ot-nom">${e.comercio||'—'}</div>
              ${e.cuenta&&e.cuenta!==e.comercio?`<div class="ot-cta">${e.cuenta}</div>`:''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              ${badge(est)}
              ${e.distKm!=null?`<span style="font-size:10px;font-weight:700;color:var(--muted)">${e.distKm<2?'En ciudad':e.distKm+' km'}</span>`:''}
            </div>
          </div>
          ${rep?.notas?`<div style="font-size:11px;color:var(--muted);font-style:italic;margin-top:4px">"${rep.notas}"</div>`:''}
          ${rep?.fecha_retiro?`<div style="font-size:11px;color:var(--teal);font-weight:700;margin-top:4px">📅 Retiro: ${rep.fecha_retiro}</div>`:''}
        </div>
        <div class="ot-body">
          ${city?`<span class="ot-chip">📍 ${city}</span>`:''}
          ${e.cp?`<span class="ot-chip">CP ${e.cp}</span>`:''}
          ${e.horario?`<span class="ot-chip">🕐 ${e.horario}</span>`:''}
        </div>
        ${dir?`<div style="padding:0 14px 8px;font-size:12px;color:var(--muted)">${dir}</div>`:''}
        <div class="ot-actions">
          <button class="btn-maps" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${mq}','_blank')">🗺️</button>
          ${tel?`<button class="btn-maps" style="background:#25D366" onclick="window.open('https://wa.me/${tel}','_blank')">💬</button>`:''}
          <button class="btn-accion ${esDone?'done':''}" onclick="abrirModal('${e.sf_id}','${(e.ot||e.sf_id).replace(/'/g,"'")}','${(e.comercio||'').replace(/'/g,"'")}')">
            ${esDone?'✅ '+est:'✏️ Actualizar estado'}
          </button>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('view-ots').innerHTML=html;
}

function setF(f){FIL=f;renderOts();}

// ── RENDER RUTA ──
function renderRuta(){
  const list=OTS.filter(e=>e.distKm!=null&&!['Exitoso','Rollout'].includes(REP[e.sf_id]?.estado||''));
  if(!list.length){
    document.getElementById('view-ruta').innerHTML='<div class="empty"><div class="empty-icon">🗺️</div><div style="font-weight:700">Sin OTs con coordenadas</div></div>';
    return;
  }
  document.getElementById('view-ruta').innerHTML=list.map((e,i)=>{
    const mq=encodeURIComponent(((e.direccion_completa||'')+' '+(e.ciudad||'')).trim()+' Argentina');
    return`<div class="ruta-card">
      <div class="ruta-num">${i+1}</div>
      <div class="ruta-info">
        <div class="ruta-ot">OT #${e.ot||e.sf_id}</div>
        <div class="ruta-nom">${e.comercio||'—'}</div>
        <div class="ruta-city">${e.ciudad||'—'}${e.direccion_completa?' · '+e.direccion_completa:''}</div>
        ${badge(REP[e.sf_id]?.estado||'Pendiente')}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <div class="ruta-dist">${e.distKm} km</div>
        <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${mq}','_blank')" style="background:#4285F4;color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">🗺️</button>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ──
function abrirModal(id,ot,nom){
  MID=id;MEST=null;
  const r=REP[id];
  document.getElementById('modal-ot-num').textContent='OT #'+ot;
  document.getElementById('modal-ot-nom').textContent=nom;
  document.getElementById('modal-fecha').value=r?.fecha_retiro||new Date().toISOString().slice(0,10);
  document.getElementById('modal-obs').value=r?.notas||'';
  document.querySelectorAll('.est-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('fecha-wrap').style.display='none';
  if(r?.estado)selEst(r.estado);
  document.getElementById('modal').classList.add('open');
}

function selEst(e){
  MEST=e;
  document.querySelectorAll('.est-btn').forEach(b=>b.classList.remove('sel'));
  const m={'Contactado':'e-cont','No encontrado':'e-noen','Confirmado retiro':'e-reti','Exitoso':'e-exit','Rollout':'e-roll'};
  document.querySelector('.est-btn.'+m[e])?.classList.add('sel');
  document.getElementById('fecha-wrap').style.display=['Confirmado retiro','Exitoso','Rollout'].includes(e)?'block':'none';
}

function closeModal(){document.getElementById('modal').classList.remove('open');MID=null;MEST=null;}

async function guardarEstado(){
  if(!MID||!MEST){toast('Seleccioná un estado',false);return;}
  const datos={
    distri_id:TOKEN,sf_id:MID,estado:MEST,
    fecha_retiro:document.getElementById('modal-fecha').value||null,
    notas:document.getElementById('modal-obs').value.trim()||null,
    updated_at:new Date().toISOString()
  };
  const{error}=await sb.from('distri_reportes').upsert(datos,{onConflict:'distri_id,sf_id'});
  if(error){toast('Error: '+error.message,false);return;}
  REP[MID]=datos;closeModal();stats();renderOts();toast('✅ Estado actualizado');
}

// Cerrar modal al tocar fondo
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

init();
</script>
