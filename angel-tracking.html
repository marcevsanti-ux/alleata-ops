<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento OTs — Angel Flores</title>
<style>
:root {
  --navy-900:#0d1b2a;--navy-800:#112236;--navy-700:#162d45;--navy-600:#1a3550;
  --teal:#1dbf8e;--blue:#1a9fd4;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --text:#e8edf2;--text-muted:#7a8fa6;--border:rgba(255,255,255,.08);
  --grad:linear-gradient(135deg,#1dbf8e,#1a9fd4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:var(--navy-900);color:var(--text);min-height:100vh;}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

/* TOPBAR */
.topbar{background:var(--navy-800);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:13px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.badge-ca{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(239,68,68,.15);color:#E30613;border:1px solid rgba(239,68,68,.25);letter-spacing:.06em}

/* STATS BAR */
.stats-bar{display:flex;gap:8px;padding:12px 20px;background:var(--navy-800);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.stat-chip:hover{border-color:rgba(255,255,255,.2)}
.stat-chip.active{background:rgba(255,255,255,.06)}
.stat-chip.all{color:var(--text)}
.stat-chip.en-proceso{color:var(--blue);border-color:rgba(26,159,212,.3)}
.stat-chip.en-proceso.active{background:rgba(26,159,212,.08)}
.stat-chip.despachado{color:var(--teal);border-color:rgba(29,191,142,.3)}
.stat-chip.despachado.active{background:rgba(29,191,142,.08)}
.stat-chip.pendiente{color:var(--orange);border-color:rgba(245,158,11,.3)}
.stat-chip.pendiente.active{background:rgba(245,158,11,.08)}
.stat-chip.sin-tracking{color:var(--red);border-color:rgba(239,68,68,.3)}
.stat-chip.sin-tracking.active{background:rgba(239,68,68,.08)}

/* TOOLBAR */
.toolbar{padding:10px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{background:var(--navy-800);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--text);font-family:'JetBrains Mono',monospace;width:260px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:rgba(29,191,142,.4)}
.search-input::placeholder{color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--navy-700);color:var(--text);font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--navy-600)}
.btn.primary{background:linear-gradient(135deg,#1dbf8e22,#1a9fd422);border-color:rgba(29,191,142,.4);color:var(--teal)}
.btn.primary:hover{background:linear-gradient(135deg,#1dbf8e33,#1a9fd433)}
.btn.running{opacity:.6;cursor:not-allowed}
.spacer{flex:1}
.last-update{font-size:10px;color:var(--text-muted)}

/* TABLE */
.table-wrap{overflow-x:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--navy-700)}
th{padding:8px 10px;text-align:left;color:var(--text-muted);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:rgba(255,255,255,.02)}
tr.hidden-row{display:none}

/* STATUS BADGES */
.estado{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;white-space:nowrap}
.estado.en-proceso{background:rgba(26,159,212,.12);color:var(--blue);border:1px solid rgba(26,159,212,.25)}
.estado.despachado{background:rgba(29,191,142,.12);color:var(--teal);border:1px solid rgba(29,191,142,.25)}
.estado.pendiente{background:rgba(245,158,11,.12);color:var(--orange);border:1px solid rgba(245,158,11,.25)}
.estado.entregado{background:rgba(29,191,142,.2);color:#0f6e56;border:1px solid rgba(29,191,142,.4)}
.estado.devuelto{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.estado.en-camino{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.25)}
.estado.en-sucursal{background:rgba(245,158,11,.2);color:#d97706;border:1px solid rgba(245,158,11,.4)}
.estado.sin-tracking{background:rgba(239,68,68,.08);color:#ef444477;border:1px solid rgba(239,68,68,.15)}

.track-link{color:var(--blue);text-decoration:none;font-size:10px;font-family:'JetBrains Mono',monospace}
.track-link:hover{text-decoration:underline}
.track-empty{color:var(--text-muted);font-size:10px}
.ot-num{font-weight:700;color:var(--text);font-size:11px}
.cuenta-txt{font-size:10px;color:var(--text-muted);margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ciudad-txt{font-size:10px;color:var(--text-muted)}
.obs-txt{font-size:9px;color:var(--orange);max-width:200px;line-height:1.4;margin-top:2px}
.ca-evento{font-size:9px;color:var(--text-muted);margin-top:3px;line-height:1.5}
.ca-evento strong{color:var(--text)}
.ca-fecha{font-size:9px;color:var(--text-muted)}

/* PROGRESS */
.progress-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin:0 20px 4px}
.progress-fill{height:100%;background:var(--grad);border-radius:1px;transition:width .3s}
.progress-label{font-size:9px;color:var(--text-muted);padding:0 20px 8px;display:none}

/* SPINNER */
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid rgba(29,191,142,.3);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty-state{text-align:center;padding:60px;color:var(--text-muted)}
.empty-icon{font-size:32px;margin-bottom:10px}
</style>
</head>

</table>

  <div>No hay resultados para este filtro</div>
</div>
</div>

// State
let ots = OTS_RAW.map(o => ({...o, estado_ca: null, ultimo_evento: null, ultimo_fecha: null}));
let filtroEstado = 'all';

// ── RENDER ────────────────────────────────────────────────────────────────────
function estadoClass(e) {
  if (!e) return 'pendiente';
  const eu = e.toLowerCase();
  if (eu.includes('entregado') || eu.includes('entrega ok')) return 'entregado';
  if (eu.includes('devuelto') || eu.includes('devolucion')) return 'devuelto';
  if (eu.includes('sucursal')) return 'en-sucursal';
  if (eu.includes('camino') || eu.includes('distribuidor') || eu.includes('clasificac') || eu.includes('procesamiento')) return 'en-camino';
  if (eu.includes('tránsito') || eu.includes('transito')) return 'en-camino';
  if (eu === 'en proceso') return 'en-proceso';
  if (eu === 'despachado') return 'despachado';
  if (eu === 'pendiente') return 'pendiente';
  return 'pendiente';
}

function estadoLabel(e) {
  if (!e) return '—';
  return e;
}

function renderRow(o, idx) {
  const sinTracking = !o.tracking;
  const caClass = o.estado_ca ? estadoClass(o.estado_ca) : (sinTracking ? 'sin-tracking' : 'pendiente');
  const caLabel = o.estado_ca || (sinTracking ? 'Sin tracking' : '—');
  const sfClass = estadoClass(o.estado_sf);

  return `<tr id="row-${idx}" data-ot="${o.ot}" data-estado="${o.estado_sf.toLowerCase().replace(/ /g,'-')}" data-ca="${caClass}" data-sin="${sinTracking?'1':'0'}">
    <td>
      <div class="ot-num">${o.ot}</div>
      <div class="cuenta-txt" title="${o.cuenta}">${o.cuenta}</div>
      <div style="font-size:9px;color:var(--text-muted);margin-top:2px">${o.fecha}</div>
    </td>
    <td><span class="estado ${sfClass}">${o.estado_sf}</span></td>
    <td><span class="estado ${caClass}" id="ca-badge-${idx}">${caLabel}</span></td>
    <td>
      <div style="font-size:11px;color:var(--text)">${o.ciudad||'—'}</div>
      <div class="ciudad-txt">${o.zona||''}</div>
    </td>
    <td>
      ${o.tracking
        ? `<a class="track-link" href="${CA_TRACK_URL}${o.tracking}" target="_blank">${o.tracking.substring(0,16)}…</a>`
        : `<span class="track-empty">Sin tracking</span>`}
    </td>
    <td id="ca-evento-${idx}">
      ${o.ultimo_evento
        ? `<div class="ca-evento"><strong>${o.ultimo_evento}</strong></div><div class="ca-fecha">${o.ultimo_fecha||''}</div>`
        : `<span style="color:var(--text-muted);font-size:10px">—</span>`}
    </td>
    <td>
      ${o.observaciones ? `<div class="obs-txt">${o.observaciones.substring(0,120)}${o.observaciones.length>120?'…':''}</div>` : '<span style="color:var(--text-muted);font-size:10px">—</span>'}
    </td>
  </tr>`;
}

function renderAll() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = ots.map((o,i) => renderRow(o,i)).join('');
  updateStats();
  applyFilters();
}

function updateStats() {
  const enProceso = ots.filter(o=>o.estado_sf==='En Proceso').length;
  const despachado = ots.filter(o=>o.estado_sf==='Despachado').length;
  const pendiente = ots.filter(o=>o.estado_sf==='Pendiente').length;
  const sinTrack = ots.filter(o=>!o.tracking).length;
  document.getElementById('cnt-all').textContent = ots.length;
  document.getElementById('cnt-en-proceso').textContent = enProceso;
  document.getElementById('cnt-despachado').textContent = despachado;
  document.getElementById('cnt-pendiente').textContent = pendiente;
  document.getElementById('cnt-sin-tracking').textContent = sinTrack;
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function filterEstado(estado, el) {
  filtroEstado = estado;
  document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = 0;
  ots.forEach((o, i) => {
    const row = document.getElementById(`row-${i}`);
    if (!row) return;
    let show = true;
    if (filtroEstado === 'sin-tracking') show = !o.tracking;
    else if (filtroEstado !== 'all') show = o.estado_sf.toLowerCase().replace(/ /g,'-') === filtroEstado;
    if (show && q) {
      const haystack = `${o.ot} ${o.cuenta} ${o.ciudad} ${o.tracking} ${o.estado_sf}`.toLowerCase();
      show = haystack.includes(q);
    }
    row.classList.toggle('hidden-row', !show);
    if (show) visible++;
  });
  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
}

// ── AUTOTRACKING ──────────────────────────────────────────────────────────────
function mapearEstadoCA(historia) {
  if (!historia) return null;
  const h = historia.toUpperCase();
  if (h.includes('ENTREGADO') || h.includes('ENTREGA OK')) return 'Entregado';
  if (h.includes('DEVUELTO') || h.includes('DEVOLUCION')) return 'Devuelto';
  if (h.includes('EN ESPERA EN SUCURSAL') || h.includes('SUCURSAL')) return 'En sucursal';
  if (h.includes('EN PODER DEL DISTRIBUIDOR') || h.includes('DISTRIBUIDOR')) return 'En camino';
  if (h.includes('CENTRO DE PROCESAMIENTO') || h.includes('CLASIFICAC')) return 'En camino';
  if (h.includes('INGRESO AL CORREO') || h.includes('INGRESO')) return 'En tránsito';
  return 'En tránsito';
}

async function runAutotracking() {
  const btn = document.getElementById('btn-autotrack');
  const icon = document.getElementById('btn-icon');
  if (btn.classList.contains('running')) return;
  btn.classList.add('running');
  icon.innerHTML = '<span class="spin"></span>';

  const conTracking = ots.filter(o => o.tracking);
  const progFill = document.getElementById('prog-fill');
  const progLabel = document.getElementById('prog-label');
  progLabel.style.display = 'block';
  progLabel.textContent = `Consultando ${conTracking.length} OTs en Correo Argentino...`;

  let procesadas = 0;

  for (const o of conTracking) {
    const idx = ots.indexOf(o);
    try {
      const res = await fetch(`${AGENT_URL}/automations/run/ca_status_checker_one`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-automation-secret': AGENT_SECRET },
        body: JSON.stringify({ tracking: o.tracking, ot: o.ot })
      });
      const data = await res.json();
      if (data && (data.estado || data.ultimo_evento || data.historia_ca)) {
        ots[idx].estado_ca     = data.estado || mapearEstadoCA(data.historia_ca || data.ultimo_evento);
        ots[idx].ultimo_evento = data.historia_ca || data.ultimo_evento || data.estado;
        ots[idx].ultimo_fecha  = data.ultimo_evento_fecha || '';
        // Update row in place
        const badge = document.getElementById(`ca-badge-${idx}`);
        const eventoEl = document.getElementById(`ca-evento-${idx}`);
        if (badge) {
          const cls = estadoClass(ots[idx].estado_ca);
          badge.className = `estado ${cls}`;
          badge.textContent = ots[idx].estado_ca;
        }
        if (eventoEl && ots[idx].ultimo_evento) {
          eventoEl.innerHTML = `<div class="ca-evento"><strong>${ots[idx].ultimo_evento}</strong></div><div class="ca-fecha">${ots[idx].ultimo_fecha}</div>`;
        }
      }
    } catch(e) {
      console.warn(`Error tracking ${o.ot}:`, e.message);
    }
    procesadas++;
    const pct = Math.round((procesadas / conTracking.length) * 100);
    progFill.style.width = pct + '%';
    progLabel.textContent = `${procesadas} / ${conTracking.length} OTs consultadas...`;
    await new Promise(r => setTimeout(r, 120));
  }

  progFill.style.width = '100%';
  progLabel.textContent = `✓ Tracking completado — ${conTracking.length} OTs actualizadas`;
  const now = new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-update').textContent = `Actualizado ${now}`;
  document.getElementById('last-update-top').textContent = `últ. ${now}`;
  btn.classList.remove('running');
  icon.textContent = '⚡';
  updateStats();
  setTimeout(() => { progLabel.style.display = 'none'; progFill.style.width = '0%'; }, 4000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
