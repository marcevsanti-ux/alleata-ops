<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Alleata · Portal Distribuidor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--teal:#1dbf8e;--blue:#4a9eff;--orange:#f59e0b;--red:#ef4444;--green:#10b981;--bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--header:#0A2540;--radius:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:var(--header);color:#fff;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{font-size:20px;font-weight:900}
.header-version{font-size:10px;color:#94a3b8;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:99px}
.header-distri{font-size:12px;font-weight:700;color:var(--teal);background:rgba(29,191,142,.15);border:1px solid rgba(29,191,142,.3);padding:4px 12px;border-radius:99px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.header-meta{font-size:10px;color:#64748b;margin-top:1px}
.stats-bar{background:var(--header);padding:10px 16px 14px;display:flex;gap:20px}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.stat-num.orange{color:var(--orange)}
.stat-num.green{color:var(--green)}
.stat-num.blue{color:var(--blue)}
.stat-label{font-size:9px;color:#64748b;font-weight:700;letter-spacing:.5px;margin-top:2px}
.tabs{background:var(--header);border-bottom:1px solid rgba(255,255,255,.08);display:flex;position:sticky;top:60px;z-index:199}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.3px}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.container{max-width:600px;margin:0 auto;padding:14px}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
.filter-chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.ot-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ot-card-header{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.ot-num{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:3px}
.ot-comercio{font-size:16px;font-weight:800;color:var(--text);line-height:1.2}
.ot-cuenta{font-size:12px;color:var(--muted);margin-top:3px}
.ot-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-top:6px}
.badge-pend{background:#fef3c7;color:#92400e}
.badge-cont{background:#dbeafe;color:#1e40af}
.badge-noen{background:#fee2e2;color:#991b1b}
.badge-exit{background:#d1fae5;color:#065f46}
.badge-reti{background:#ede9fe;color:#5b21b6}
.badge-roll{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.ot-card-body{padding:12px 14px}
.ot-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ot-info-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.ot-info-value{font-size:12px;font-weight:600;color:var(--text)}
.map-wrap{border-radius:10px;overflow:hidden;height:130px;background:#e8f4f2;position:relative;margin-bottom:12px;border:1px solid var(--border)}
.map-wrap iframe{width:100%;height:100%;border:none}
.map-open-btn{position:absolute;top:8px;right:8px;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.ot-card-actions{padding:0 14px 14px;display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:inherit;text-decoration:none}
.btn-teal{background:var(--teal);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-wa{background:#25D366;color:#fff}
.btn-map{background:#4285F4;color:#fff}
.btn-sm{padding:7px 12px;font-size:11px}
.btn-block{width:100%}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-ot-num{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:4px}
.modal-ot-name{font-size:17px;font-weight:800;margin-bottom:16px}
.modal-section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.estado-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.estado-btn{padding:12px 8px;border-radius:12px;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;text-align:center;background:transparent;font-family:inherit;transition:all .15s}
.e-cont{border-color:#3b82f6;color:#3b82f6}.e-cont.sel{background:#3b82f6;color:#fff}
.e-noen{border-color:#ef4444;color:#ef4444}.e-noen.sel{background:#ef4444;color:#fff}
.e-exit{border-color:#10b981;color:#10b981}.e-exit.sel{background:#10b981;color:#fff}
.e-reti{border-color:#8b5cf6;color:#8b5cf6}.e-reti.sel{background:#8b5cf6;color:#fff}
.e-roll{border-color:#16a34a;color:#16a34a;grid-column:1/-1}.e-roll.sel{background:#16a34a;color:#fff}
.field{margin-bottom:12px}
.label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.input:focus{border-color:var(--teal)}
.textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;outline:none;resize:none;margin-bottom:12px}
.textarea:focus{border-color:var(--teal)}
.modal-footer{display:flex;gap:8px}
.agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.agenda-mes{font-size:15px;font-weight:800}
.cal-nav{background:none;border:1.5px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dow-label{text-align:center;font-size:9px;font-weight:700;color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{background:var(--bg);border-radius:8px;padding:5px 2px;text-align:center;font-size:12px;cursor:pointer;min-height:36px;border:1.5px solid transparent}
.cal-day.has-ot{background:#d1fae5;font-weight:800;color:#065f46}
.cal-day.today{border-color:var(--teal)}
.cal-day.other-month{opacity:.25;cursor:default}
.cal-day-count{font-size:8px;font-weight:800}
.ruta-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.ruta-num{width:28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ruta-ot{font-size:11px;font-weight:700;color:var(--teal)}
.ruta-nombre{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ruta-ciudad{font-size:11px;color:var(--muted)}
.ruta-dist{font-size:12px;font-weight:700;color:var(--orange);flex-shrink:0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">🚚 Alleata</div>
      <div class="header-meta" id="header-meta">Portal Distribuidor</div>
    </div>
    <div class="header-version">v1.2.0</div>
  </div>
  <div class="header-distri" id="header-distri">—</div>
</div>
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat-item"><div class="stat-num" id="s-total">0</div><div class="stat-label">TOTAL</div></div>
  <div class="stat-item"><div class="stat-num orange" id="s-pend">0</div><div class="stat-label">PENDIENTES</div></div>
  <div class="stat-item"><div class="stat-num blue" id="s-cont">0</div><div class="stat-label">CONTACTADAS</div></div>
  <div class="stat-item"><div class="stat-num green" id="s-exit">0</div><div class="stat-label">EXITOSAS</div></div>
</div>
<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" id="tab-ots" onclick="switchTab('ots')">📦 OTs</div>
  <div class="tab" id="tab-agenda" onclick="switchTab('agenda')">📅 Agenda</div>
  <div class="tab" id="tab-ruta" onclick="switchTab('ruta')">🗺️ Hoja de Ruta</div>
</div>
<div class="container">
  <div id="view-loading" class="empty"><div class="empty-icon">⏳</div><div style="font-weight:700">Cargando tu portal...</div></div>
  <div id="view-error" style="display:none" class="empty"><div class="empty-icon">❌</div><div id="error-msg" style="font-weight:700">Link inválido</div></div>
  <div id="view-ots" style="display:none"><div class="filter-bar" id="filter-bar"></div><div id="ots-list"></div></div>
  <div id="view-agenda" style="display:none">
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px">
      <div class="agenda-header">
        <button class="cal-nav" onclick="agendaNav(-1)">◀</button>
        <div class="agenda-mes" id="agenda-mes"></div>
        <button class="cal-nav" onclick="agendaNav(1)">▶</button>
      </div>
      <div class="cal-dow" id="cal-dow"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div id="agenda-detail"></div>
  </div>
  <div id="view-ruta" style="display:none"><div id="ruta-list"></div></div>
</div>
<div id="modal-estado" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-ot-num" id="modal-ot-num"></div>
    <div class="modal-ot-name" id="modal-ot-name"></div>
    <div class="modal-section-label">Marcar como</div>
    <div class="estado-btns">
      <button class="estado-btn e-cont" onclick="selEst('Contactado')">📞 Contactado</button>
      <button class="estado-btn e-noen" onclick="selEst('No encontrado')">❌ No encontrado</button>
      <button class="estado-btn e-exit" onclick="selEst('Exitoso')">✅ Exitoso</button>
      <button class="estado-btn e-reti" onclick="selEst('Confirmado retiro')">📦 Confirmado retiro</button>
      <button class="estado-btn e-roll" onclick="selEst('Rollout')">🔄 Rollout</button>
    </div>
    <div class="field" id="fecha-wrap" style="display:none">
      <label class="label">Fecha de retiro</label>
      <input type="date" class="input" id="modal-fecha">
    </div>
    <textarea class="textarea" id="modal-obs" placeholder="Observación (opcional)..." rows="3"></textarea>
    <div class="modal-footer">
      <button class="btn btn-teal btn-block" onclick="guardarEstado()">Guardar</button>
      <button class="btn btn-ghost" onclick="closeModal()" style="min-width:90px">Cancelar</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

let D=null,OTS=[],REP={},MID=null,MEST=null,AMES=new Date(),FIL='Todas';
function toast(m,ok=true){const t=document.getElementById('toast');t.textContent=m;t.style.background=ok?'#0f172a':'#ef4444';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
async function init(){
  if(!TOKEN){err('Falta el token en la URL');return;}
  const{data:d}=await sb.from('distribuidores').select('*').eq('id',TOKEN).maybeSingle();
  if(!d){err('Distribuidor no encontrado');return;}
  D=d;
  document.getElementById('header-distri').textContent=d.nombre+(d.apellido&&d.apellido!==d.nombre?' '+d.apellido:'');
  document.getElementById('header-meta').textContent='CP '+(d.cp||'—')+' · Radio '+(d.radio||50)+' km';
  document.title='Alleata · '+d.nombre;
  const{data:ots}=await sb.from('v_ordenes_con_sla')
    .select('sf_id,ot,comercio,cuenta,ciudad,provincia,cp,estado,operador_id,logistica,observaciones,contacto,horario,direccion_completa,sla_estado,dias_transcurridos')
    .eq('tipo','desinstalacion')
    .not('estado','in','("Terminal recuperada","Extraviada")');
  if(d.lat&&d.lon){
    OTS=(ots||[]).map(e=>{
      const n=parseInt((e.cp||'').replace(/[^0-9]/g,''));
      const c=CP_COORDS[n];
      const dist=c?Math.round(hav(d.lat,d.lon,c[0],c[1])*10)/10:null;
      return{...e,distKm:dist};
    }).filter(e=>e.distKm===null||e.distKm<=(d.radio||50))
      .sort((a,b)=>(a.distKm??999)-(b.distKm??999));
  }else{OTS=ots||[];}
  const{data:reps}=await sb.from('distri_reportes').select('*').eq('distri_id',TOKEN);
  REP={};(reps||[]).forEach(r=>{REP[r.sf_id]=r;});
  document.getElementById('view-loading').style.display='none';
  document.getElementById('tabs').style.display='flex';
  document.getElementById('stats-bar').style.display='flex';
  stats();switchTab('ots');
}
function err(m){document.getElementById('view-loading').style.display='none';document.getElementById('error-msg').textContent=m;document.getElementById('view-error').style.display='block';}
function stats(){
  document.getElementById('s-total').textContent=OTS.length;
  document.getElementById('s-pend').textContent=OTS.filter(e=>!REP[e.sf_id]||REP[e.sf_id].estado==='Pendiente').length;
  document.getElementById('s-cont').textContent=OTS.filter(e=>['Contactado','Confirmado retiro'].includes(REP[e.sf_id]?.estado)).length;
  document.getElementById('s-exit').textContent=OTS.filter(e=>['Exitoso','Rollout'].includes(REP[e.sf_id]?.estado)).length;
}
function switchTab(t){
  ['ots','agenda','ruta'].forEach(x=>{document.getElementById('view-'+x).style.display=x===t?'block':'none';document.getElementById('tab-'+x).classList.toggle('active',x===t);});
  if(t==='ots')renderOts();if(t==='agenda')renderAgenda();if(t==='ruta')renderRuta();
}
function badge(e){const m={'Pendiente':'badge-pend ⏳ Pendiente','Contactado':'badge-cont 📞 Contactado','No encontrado':'badge-noen ❌ No encontrado','Confirmado retiro':'badge-reti 📦 Confirmado retiro','Exitoso':'badge-exit ✅ Exitoso','Rollout':'badge-roll 🔄 Rollout'};const v=(m[e]||'badge-pend '+e).split(' ');return`<span class="ot-badge ${v[0]}">${v.slice(1).join(' ')}</span>`;}
function renderOts(){
  const cnt={};OTS.forEach(e=>{const s=REP[e.sf_id]?.estado||'Pendiente';cnt[s]=(cnt[s]||0)+1;});
  const estados=['Todas','Pendiente','Contactado','No encontrado','Confirmado retiro','Exitoso','Rollout'];
  document.getElementById('filter-bar').innerHTML=estados.map(s=>`<div class="filter-chip ${FIL===s?'active':''}" onclick="setF('${s}')">${s} (${s==='Todas'?OTS.length:cnt[s]||0})</div>`).join('');
  const list=FIL==='Todas'?OTS:OTS.filter(e=>(REP[e.sf_id]?.estado||'Pendiente')===FIL);
  if(!list.length){document.getElementById('ots-list').innerHTML='<div class="empty"><div class="empty-icon">📦</div><div style="font-weight:700">Sin OTs</div></div>';return;}
  document.getElementById('ots-list').innerHTML=list.map(e=>{
    const rep=REP[e.sf_id],est=rep?.estado||'Pendiente';
    const dir=e.direccion_completa||'',city=e.ciudad||'';
    const mq=encodeURIComponent((dir?dir+' '+city:city)+' Argentina');
    const tel=(e.contacto||'').replace(/\D/g,'');
    return`<div class="ot-card">
<div class="ot-card-header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><div class="ot-num">OT #${e.ot||e.sf_id}</div><div class="ot-comercio">${e.comercio||'—'}</div><div class="ot-cuenta">${e.cuenta||'—'}</div></div>
    ${badge(est)}
  </div>
  ${rep?.notas?`<div style="font-size:11px;color:var(--muted);margin-top:6px;font-style:italic">"${rep.notas}"</div>`:''}
  ${rep?.fecha_retiro?`<div style="font-size:11px;color:var(--teal);font-weight:700;margin-top:4px">📅 Retiro: ${rep.fecha_retiro}</div>`:''}
</div>
<div class="ot-card-body">
  <div class="ot-info-grid">
    <div><div class="ot-info-label">Ciudad</div><div class="ot-info-value">${city||'—'}</div></div>
    <div><div class="ot-info-label">CP${e.distKm!=null?' · Dist':''}}</div><div class="ot-info-value">${e.cp||'—'}${e.distKm!=null?' · '+e.distKm+'km':''}</div></div>
    ${dir?`<div style="grid-column:1/-1"><div class="ot-info-label">Dirección</div><div class="ot-info-value">${dir}</div></div>`:''}
    ${e.horario?`<div><div class="ot-info-label">Horario</div><div class="ot-info-value">${e.horario}</div></div>`:''}
    ${e.sla_estado?`<div><div class="ot-info-label">SLA</div><div class="ot-info-value" style="color:${e.sla_estado==='critico'?'var(--red)':e.sla_estado==='alerta'?'var(--orange)':'var(--green)'}">${e.dias_transcurridos}d (${e.sla_estado})</div></div>`:''}
  </div>
  ${dir?`<div class="map-wrap"><iframe loading="lazy" src="https://maps.google.com/maps?q=${mq}&output=embed&z=15" allowfullscreen></iframe><button class="map-open-btn" onclick="window.open('https://maps.google.com/?q=${mq}','_blank')">🗺️ Abrir</button></div>`:''}
</div>
<div class="ot-card-actions">
  <button class="btn btn-teal" onclick="abrirModal('${e.sf_id}','${e.ot||e.sf_id}','${(e.comercio||'').replace(/'/g,'&#39;')}')">✏️ Actualizar estado</button>
  ${tel?`<a href="https://wa.me/${tel}" target="_blank" class="btn btn-wa btn-sm">💬 WA</a>`:''}
  ${dir||city?`<a href="https://maps.google.com/?q=${mq}" target="_blank" class="btn btn-map btn-sm">🗺️ Maps</a>`:''}
</div></div>`;
  }).join('');
}
function setF(f){FIL=f;renderOts();}
function abrirModal(id,ot,nom){
  MID=id;MEST=null;
  const r=REP[id];
  document.getElementById('modal-ot-num').textContent='OT #'+ot;
  document.getElementById('modal-ot-name').textContent=nom;
  document.getElementById('modal-fecha').value=r?.fecha_retiro||new Date().toISOString().slice(0,10);
  document.getElementById('modal-obs').value=r?.notas||'';
  document.querySelectorAll('.estado-btn').forEach(b=>b.classList.remove('sel'));
  if(r?.estado)selEst(r.estado);
  document.getElementById('modal-estado').style.display='flex';
}
function selEst(e){
  MEST=e;
  document.querySelectorAll('.estado-btn').forEach(b=>b.classList.remove('sel'));
  const m={'Contactado':'e-cont','No encontrado':'e-noen','Exitoso':'e-exit','Confirmado retiro':'e-reti','Rollout':'e-roll'};
  document.querySelector('.estado-btn.'+m[e])?.classList.add('sel');
  document.getElementById('fecha-wrap').style.display=['Confirmado retiro','Exitoso','Rollout'].includes(e)?'block':'none';
}
function closeModal(){document.getElementById('modal-estado').style.display='none';MID=null;MEST=null;}
async function guardarEstado(){
  if(!MID||!MEST){toast('Seleccioná un estado',false);return;}
  const datos={distri_id:TOKEN,sf_id:MID,estado:MEST,fecha_retiro:document.getElementById('modal-fecha').value||null,notas:document.getElementById('modal-obs').value.trim()||null,updated_at:new Date().toISOString()};
  const{error}=await sb.from('distri_reportes').upsert(datos,{onConflict:'distri_id,sf_id'});
  if(error){toast('Error: '+error.message,false);return;}
  REP[MID]=datos;closeModal();stats();renderOts();toast('✅ Estado actualizado');
}
function renderAgenda(){
  const y=AMES.getFullYear(),m=AMES.getMonth();
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('agenda-mes').textContent=meses[m]+' '+y;
  document.getElementById('cal-dow').innerHTML=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>`<div class="cal-dow-label">${d}</div>`).join('');
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),today=new Date().toISOString().slice(0,10);
  const opd={};Object.values(REP).forEach(r=>{if(r.fecha_retiro)opd[r.fecha_retiro]=(opd[r.fecha_retiro]||0)+1;});
  let h='';for(let i=0;i<fd;i++)h+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const c=opd[ds]||0;h+=`<div class="cal-day${c?' has-ot':''} ${ds===today?'today':''}" onclick="agendaDay('${ds}')">${d}${c?`<div class="cal-day-count">${c}</div>`:''}</div>`;}
  document.getElementById('cal-grid').innerHTML=h;
  document.getElementById('agenda-detail').innerHTML='';
}
function agendaNav(d){AMES=new Date(AMES.getFullYear(),AMES.getMonth()+d,1);renderAgenda();}
function agendaDay(ds){
  const list=OTS.filter(e=>REP[e.sf_id]?.fecha_retiro===ds);
  const det=document.getElementById('agenda-detail');
  if(!list.length){det.innerHTML='';return;}
  const fecha=new Date(ds+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});
  det.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px"><div style="font-weight:800;font-size:13px;margin-bottom:10px;color:var(--teal)">📅 ${fecha}</div>${list.map(e=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-weight:700;color:var(--teal)">OT #${e.ot||e.sf_id}</div><div style="font-size:13px;font-weight:700">${e.comercio||'—'}</div><div style="font-size:11px;color:var(--muted)">${e.ciudad||'—'}${e.horario?' · '+e.horario:''}</div></div>`).join('')}</div>`;
}
function renderRuta(){
  const list=OTS.filter(e=>e.distKm!=null&&!['Exitoso','Rollout'].includes(REP[e.sf_id]?.estado||''));
  if(!list.length){document.getElementById('ruta-list').innerHTML='<div class="empty"><div class="empty-icon">🗺️</div><div style="font-weight:700">Sin OTs con coordenadas</div></div>';return;}
  document.getElementById('ruta-list').innerHTML=list.map((e,i)=>`<div class="ruta-card"><div class="ruta-num">${i+1}</div><div class="ruta-info"><div class="ruta-ot">OT #${e.ot||e.sf_id}</div><div class="ruta-nombre">${e.comercio||'—'}</div><div class="ruta-ciudad">${e.ciudad||'—'}${e.direccion_completa?' · '+e.direccion_completa:''}</div>${badge(REP[e.sf_id]?.estado||'Pendiente')}</div><div class="ruta-dist">${e.distKm} km</div></div>`).join('');
}
init();
</script>
</body>
</html>
