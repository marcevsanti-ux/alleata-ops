<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config Ally</title>
</head>
<body>

<h2>Configuración Ally - Reglas</h2>

<div id="reglas-container"></div>
<button onclick="crearNuevaRegla()">+ Nueva regla</button>

<script>
const API_URL = "https://TU_BACKEND_URL"; // ajustar

// =============================
// CARGAR REGLAS
// =============================
async function cargarAllyReglas() {
  const res = await fetch(`${API_URL}/ally/reglas`);
  const reglas = await res.json();

  const container = document.getElementById("reglas-container");
  container.innerHTML = "";

  reglas.forEach(r => {
    const div = document.createElement("div");
    div.style.border = "1px solid #ccc";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <b>${r.nombre}</b><br/>
      Estado: <input type="checkbox" ${r.activa ? "checked" : ""} onchange="toggleRegla(${r.id}, this.checked)" />
      <br/><br/>
      Condición: ${r.condicion}
      <br/>
      Acción: ${r.accion}
    `;

    container.appendChild(div);
  });
}

// =============================
// TOGGLE
// =============================
async function toggleRegla(id, estado) {
  await fetch(`${API_URL}/ally/reglas/${id}/toggle`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ activa: estado })
  });
}

// =============================
// CREAR REGLA
// =============================
async function crearNuevaRegla() {
  const nombre = prompt("Nombre de la regla:");
  const condicion = prompt("Condición (ej: estado = ENTREGADA):");
  const accion = prompt("Acción (ej: enviar_whatsapp):");

  if (!nombre) return;

  await fetch(`${API_URL}/ally/reglas`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nombre, condicion, accion })
  });

  cargarAllyReglas();
}

// =============================
// INIT
// =============================
cargarAllyReglas();
</script>

</body>
</html>
