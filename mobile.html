<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alleata · SIMs Mobile</title>
<style>
  :root {
    --navy-900: #0d1b2a;
    --navy-800: #112236;
    --navy-700: #162d45;
    --navy-600: #1c3a57;
    --teal: #1dbf8e;
    --blue: #1a9fd4;
    --grad: linear-gradient(135deg, #1dbf8e, #1a9fd4);
    --red: #e05555;
    --amber: #f5a623;
    --text: #e8f0f8;
    --text-muted: #7a9bbf;
    --radius: 14px;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--navy-900); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

  /* ──── SCREENS ──── */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity .3s, transform .3s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ──── LOGIN ──── */
  #screen-login {
    background: var(--navy-900);
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 0;
  }
  .login-bg {
    position: absolute; inset: 0; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(29,191,142,.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 110%, rgba(26,159,212,.15) 0%, transparent 70%);
  }
  .login-logo {
    position: relative; z-index:1; margin-bottom: 8px;
    width: 64px; height: 64px;
    background: var(--grad); border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(29,191,142,.3);
  }
  .login-logo svg { width: 36px; height: 36px; }
  .login-brand { position:relative;z-index:1; font-size: 26px; font-weight: 800; margin-bottom: 4px; letter-spacing: -.5px; }
  .login-sub { position:relative;z-index:1; color: var(--text-muted); font-size: 13px; margin-bottom: 40px; }
  .login-card { position:relative;z-index:1; width:100%; max-width:380px; background: var(--navy-800); border-radius: 20px; padding: 28px 24px; border: 1px solid rgba(255,255,255,.07); }
  .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .field input { width:100%; background: var(--navy-700); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 13px 16px; color: var(--text); font-size: 16px; outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--teal); }
  .btn-primary { width:100%; background: var(--grad); border: none; border-radius: 12px; padding: 15px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; transition: opacity .2s, transform .1s; }
  .btn-primary:active { opacity:.85; transform:scale(.98); }
  .login-error { color: var(--red); font-size:13px; margin-top:12px; text-align:center; min-height:18px; }
  .login-spinner { display:none; width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto; }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ──── MAIN APP ──── */
  #screen-app { background: var(--navy-900); padding-bottom: env(safe-area-inset-bottom); }

  /* Topbar */
  .topbar { background: var(--navy-800); display:flex; align-items:center; padding: 14px 18px; gap:12px; border-bottom: 1px solid rgba(255,255,255,.06); padding-top: calc(14px + env(safe-area-inset-top)); flex-shrink: 0; }
  .topbar-logo { width:34px;height:34px; background:var(--grad); border-radius:10px; display:flex;align-items:center;justify-content:center; flex-shrink:0; }
  .topbar-logo svg { width:20px;height:20px; }
  .topbar-title { flex:1; font-size:17px; font-weight:700; }
  .topbar-user { width:36px;height:36px;border-radius:50%;background:var(--navy-700);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;color:var(--teal); }

  /* Tabs */
  .tabs { display:flex; background:var(--navy-800); border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
  .tab { flex:1; padding:14px 8px; text-align:center; font-size:11px; font-weight:600; color:var(--text-muted); cursor:pointer; letter-spacing:.3px; text-transform:uppercase; border-bottom:2px solid transparent; transition:color .2s, border-color .2s; display:flex;flex-direction:column;align-items:center;gap:4px; }
  .tab svg { width:20px;height:20px; }
  .tab.active { color:var(--teal); border-bottom-color:var(--teal); }

  /* Tab panes */
  .pane { flex:1; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }
  .pane.hidden { display:none; }

  /* ──── PANE SCAN ──── */
  .scan-area { padding:16px; display:flex;flex-direction:column;gap:14px; }

  /* Camera */
  .cam-wrapper { position:relative; border-radius:var(--radius); overflow:hidden; background:#000; aspect-ratio:4/3; }
  #video { width:100%;height:100%;object-fit:cover;display:block; }
  .cam-overlay { position:absolute;inset:0; display:flex;align-items:center;justify-content:center; }
  .cam-frame { width:200px;height:200px;position:relative; }
  .cam-frame::before,.cam-frame::after,.corner-br,.corner-bl { content:'';position:absolute;width:28px;height:28px;border-color:var(--teal);border-style:solid;border-radius:4px; }
  .cam-frame::before { top:0;left:0;border-width:3px 0 0 3px; }
  .cam-frame::after  { top:0;right:0;border-width:3px 3px 0 0; }
  .corner-br { bottom:0;right:0;border-width:0 3px 3px 0; }
  .corner-bl { bottom:0;left:0;border-width:0 0 3px 3px; }
  .scan-line { position:absolute;left:6px;right:6px;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);border-radius:2px;animation:scanmove 2s ease-in-out infinite; top:6px; }
  @keyframes scanmove{0%,100%{top:6px;opacity:.8}50%{top:calc(100% - 10px);opacity:1}}
  .cam-status { position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(13,27,42,.9));font-size:12px;text-align:center;color:var(--text-muted); }
  .cam-status.active { color:var(--teal); }

  .cam-controls { display:flex;gap:10px; }
  .btn-cam { flex:1; display:flex;align-items:center;justify-content:center;gap:8px; padding:14px; border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s; }
  .btn-cam:active{opacity:.8;transform:scale(.97);}
  .btn-cam.primary{background:var(--grad);color:#fff;}
  .btn-cam.secondary{background:var(--navy-700);color:var(--text);border:1px solid rgba(255,255,255,.1);}

  /* Upload button */
  .upload-zone { border:2px dashed rgba(255,255,255,.15);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s; }
  .upload-zone:hover,.upload-zone.drag{border-color:var(--teal);}
  .upload-zone p { font-size:13px;color:var(--text-muted);margin-top:8px; }
  #file-input{display:none;}

  /* Result card */
  .result-card { border-radius:var(--radius);overflow:hidden;background:var(--navy-800);border:1px solid rgba(255,255,255,.07); }
  .result-header { padding:14px 16px;display:flex;align-items:center;gap:10px; background:var(--navy-700); }
  .result-status { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
  .result-status.ok{background:var(--teal);}
  .result-status.warn{background:var(--amber);}
  .result-status.err{background:var(--red);}
  .result-header span{font-weight:700;font-size:15px;flex:1;}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;}
  .badge.asignada{background:rgba(29,191,142,.15);color:var(--teal);}
  .badge.disponible{background:rgba(26,159,212,.15);color:var(--blue);}
  .badge.extraviada{background:rgba(224,85,85,.15);color:var(--red);}
  .badge.default{background:rgba(255,255,255,.1);color:var(--text-muted);}
  .result-body { padding:14px 16px;display:flex;flex-direction:column;gap:10px; }
  .result-row { display:flex;justify-content:space-between;align-items:center;font-size:13px; }
  .result-row .label{color:var(--text-muted);}
  .result-row .value{font-family:var(--font-mono);font-size:12px;text-align:right;max-width:60%;word-break:break-all;}
  .result-not-found { padding:20px;text-align:center;color:var(--text-muted);font-size:14px; }

  /* Processing overlay */
  .processing { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:12px; }
  .processing .spinner { width:36px;height:36px;border:3px solid rgba(29,191,142,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite; }
  .processing p { color:var(--text-muted);font-size:14px; }

  /* ──── PANE SEARCH ──── */
  .search-area { padding:16px;display:flex;flex-direction:column;gap:14px; }
  .search-box { display:flex;gap:10px; }
  .search-box input { flex:1;background:var(--navy-700);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 16px;color:var(--text);font-size:16px;outline:none;transition:border-color .2s; }
  .search-box input:focus{border-color:var(--teal);}
  .search-box button{background:var(--grad);border:none;border-radius:12px;padding:0 18px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

  /* ──── PANE HISTORY ──── */
  .history-area { padding:16px;display:flex;flex-direction:column;gap:10px; }
  .history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .history-header h3{font-size:15px;font-weight:700;}
  .history-clear{font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 8px;}
  .history-item{background:var(--navy-800);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.06);}
  .history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .history-info{flex:1;min-width:0;}
  .history-serie{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .history-cuenta{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .history-time{font-size:11px;color:var(--text-muted);flex-shrink:0;}
  .history-empty{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:14px;}

  /* ──── DRAWER ──── */
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
  .drawer-backdrop.open{opacity:1;pointer-events:all;}
  .drawer{position:fixed;top:0;right:-320px;width:290px;height:100%;background:var(--navy-800);z-index:101;transition:right .3s;padding:24px;display:flex;flex-direction:column;gap:20px;padding-top:calc(24px + env(safe-area-inset-top)); border-left:1px solid rgba(255,255,255,.07);}
  .drawer.open{right:0;}
  .drawer-avatar{width:56px;height:56px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;}
  .drawer-name{font-size:18px;font-weight:700;}
  .drawer-email{font-size:13px;color:var(--text-muted);}
  .drawer-divider{border:none;border-top:1px solid rgba(255,255,255,.08);}
  .drawer-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s;}
  .drawer-item:hover{background:var(--navy-700);}
  .drawer-item svg{width:20px;height:20px;color:var(--text-muted);}
  .drawer-logout{margin-top:auto;background:rgba(224,85,85,.1);color:var(--red);border:1px solid rgba(224,85,85,.2);border-radius:12px;padding:13px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;}

  /* toast */
  .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy-700);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;white-space:nowrap;z-index:200;transition:transform .3s,opacity .3s;opacity:0;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.ok{border-color:var(--teal);}
  .toast.err{border-color:var(--red);}

  /* no SIMs db notice */
  .db-notice{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:12px;padding:14px;font-size:13px;color:var(--amber);line-height:1.5;}

  @media (prefers-color-scheme: dark){body{background:var(--navy-900);}}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SCREEN: LOGIN
════════════════════════════════════════ -->
<div id="screen-login" class="screen">
  <div class="login-bg"></div>
  <div class="login-logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="10" fill="none"/>
      <path d="M8 26L18 10L28 26" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 20H24" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="login-brand">Alleata</div>
  <div class="login-sub">Portal de Operaciones · SIMs Mobile</div>
  <div style="position:relative;z-index:1;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:32px;">v2.0.6</div>
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <div class="field">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="usuario@empresa.com" autocomplete="email" inputmode="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div style="position:relative;">
        <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;">
        <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;" id="btn-toggle-pass">
          <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-spinner" id="login-spinner"></div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     SCREEN: APP
════════════════════════════════════════ -->
<div id="screen-app" class="screen hidden">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 36 36" fill="none"><path d="M8 26L18 10L28 26" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 20H24" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
    </div>
    <span class="topbar-title">Verificador SIMs</span>
    <span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-right:4px;">v2.0.6</span>
    <div class="topbar-user" id="topbar-user-btn" onclick="openDrawer()">?</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-scan" onclick="switchTab('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Escanear
    </div>
    <div class="tab" id="tab-search" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Buscar
    </div>
    <div class="tab" id="tab-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
      Historial
    </div>
  </div>

  <!-- Pane: SCAN -->
  <div class="pane" id="pane-scan">
    <div class="scan-area">

      <!-- db-notice removed: DB is now in Supabase -->

      <!-- Camera -->
      <div class="cam-wrapper" id="cam-wrapper">
        <video id="video" playsinline autoplay muted></video>
        <div class="cam-overlay">
          <div class="cam-frame">
            <div class="scan-line"></div>
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
          </div>
        </div>
        <div class="cam-status" id="cam-status">Activá la cámara para escanear</div>
      </div>

      <div class="cam-controls">
        <button class="btn-cam primary" id="btn-camera" onclick="toggleCamera()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Activar cámara
        </button>
        <button class="btn-cam secondary" id="btn-capture" onclick="capturePhoto()" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          Capturar
        </button>
      </div>

      <!-- Upload alternative -->
      <div class="upload-zone" onclick="document.getElementById('file-input').click()" id="upload-zone">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);margin:0 auto;display:block"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>O subí una foto desde la galería</p>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)">

      <!-- Result -->
      <div id="scan-result"></div>

    </div>
  </div>

  <!-- Pane: SEARCH -->
  <div class="pane hidden" id="pane-search">
    <div class="search-area">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Serie, sufijo o línea..." inputmode="search" onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">Buscar</button>
      </div>
      <div id="search-result"></div>
    </div>
  </div>

  <!-- Pane: HISTORY -->
  <div class="pane hidden" id="pane-history">
    <div class="history-area">
      <div class="history-header">
        <h3>Escaneos recientes</h3>
        <span class="history-clear" onclick="clearHistory()">Borrar todo</span>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     DRAWER
════════════════════════════════════════ -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div>
    <div class="drawer-avatar" id="drawer-avatar">?</div>
    <div style="height:12px"></div>
    <div class="drawer-name" id="drawer-name">—</div>
    <div class="drawer-email" id="drawer-email">—</div>
  </div>
  <hr class="drawer-divider">
  <div class="drawer-item" onclick="window.location='https://marcevsanti-ux.github.io/alleata-ops/'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Portal completo (desktop)
  </div>
  <div class="drawer-logout" onclick="doLogout()">Cerrar sesión</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<canvas id="canvas" style="display:none"></canvas>

<!-- ═══════════════════════════════════════
     SUPABASE + GEMINI CONFIG

<script>

// ─── SUPABASE MINI CLIENT ────────────────
async function sbFetch(path, opts = {}) {
  const r = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': 'Bearer ' + (getToken() || SUPABASE_ANON),
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
  return r;
}

function getToken() { return localStorage.getItem('sb_token'); }
function setToken(t) { localStorage.setItem('sb_token', t); }
function clearToken() { localStorage.removeItem('sb_token'); localStorage.removeItem('sb_user'); }

async function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-error');
  const spinner = document.getElementById('login-spinner');
  const btn = document.getElementById('btn-login');

  if (!email || !pass) { errEl.textContent = 'Completá todos los campos.'; return; }
  errEl.textContent = '';
  btn.style.display = 'none';
  if (spinner) spinner.style.display = 'block';

  try {
    const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    console.log('Auth response:', JSON.stringify(d).substring(0, 200));
    if (!r.ok || d.error || d.error_description) throw new Error(d.error_description || d.error || 'Error de autenticación');
    if (!d.access_token) throw new Error('No se recibió token');
    setToken(d.access_token);
    const userId = d.user?.id || d.user_id;
    const userEmail = d.user?.email || email;
    localStorage.setItem('sb_user', JSON.stringify({ email: userEmail, id: userId }));
    currentUser = { email: userEmail, id: userId };
    await enterApp();
  } catch(e) {
    console.error('Login error:', e.message);
    errEl.textContent = e.message || 'Email o contraseña incorrectos.';
  } finally {
    btn.style.display = 'block';
    if (spinner) spinner.style.display = 'none';
  }
}

// ─── LOOKUP via Supabase ─────────────────
async function lookupSIM(query) {
  if (!query) return null;
  const q = query.trim().replace(/\s+/g,'');

  // Build OR filter: exact serie, exact linea, suffix match
  const suffix = q.slice(-9);
  const filters = [
    `serie.eq.${q}`,
    `linea.eq.${q}`,
    `serie.like.*${suffix}`
  ].join(',');

  try {
    const r = await sbFetch(
      `/rest/v1/sims?or=(${encodeURIComponent(filters)})&limit=1&select=serie,linea,ubicacion,cuenta,estado`
    );
    const data = await r.json();
    if (Array.isArray(data) && data.length > 0) return data[0];
  } catch(e) {
    console.error('Lookup error:', e);
  }
  return null;
}

async function lookupSIMMulti(candidates) {
  // Try multiple extracted values at once
  if (!candidates.length) return null;
  const filters = candidates.flatMap(q => {
    const clean = q.trim().replace(/\s+/g,'');
    const suffix = clean.slice(-9);
    return [`serie.eq.${clean}`, `linea.eq.${clean}`, `serie.like.*${suffix}`];
  }).join(',');

  try {
    const r = await sbFetch(
      `/rest/v1/sims?or=(${encodeURIComponent(filters)})&limit=1&select=serie,linea,ubicacion,cuenta,estado`
    );
    const data = await r.json();
    if (Array.isArray(data) && data.length > 0) return data[0];
  } catch(e) {}
  return null;
}

async function capturePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  await processImage(dataUrl.split(',')[1], 'image/jpeg');
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const b64 = e.target.result.split(',')[1];
    const mime = file.type || 'image/jpeg';
    await processImage(b64, mime);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ─── GEMINI OCR ──────────────────────────
async function processImage(b64, mime) {
  const resultEl = document.getElementById('scan-result');
  resultEl.innerHTML = `<div class="processing"><div class="spinner"></div><p>Analizando imagen con IA...</p></div>`;

  const KNOWN_PREFIXES=["8954310226","8954343122","8954318226","8995431224","8954310196","8954310202","8954318202","8954318224","8954316225","8954311624","8954310211","8954343082","8954310174","8954318211","8954343052","0000000000","8954310184","8954312252","8954318185","8954318216","8954341012","8954310166","8954316244","8954343102","8954314146","8954343012","8954318246","8954312245","8954310163","8954310216","8954310072","8954310213","8954316252","8954318245","8954343310","8954314165","8954310191","8943122451","8954318215","8954312224","8954318236","8954312212","8954318153","8954313012"];

  const prompt = `Chips SIM Claro Argentina. Arriba: prefijo (ej: "8954318224"). Abajo: sufijo (ej: "056426839 0"). ICCID = PREFIJO+SUFIJO. Respondé SOLO con números completos, uno por línea.`;

  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: prompt },
          { inlineData: { mimeType: mime, data: b64 } }
        ]}],
        generationConfig: { temperature: 0, maxOutputTokens: 512 }
      })
    });
    const d = await r.json();
    const text = d?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    console.log('Gemini raw:', text);

    // Extraer con regex igual que el mobile viejo
    const numbers  = [...new Set(text.match(/8954\d{9,}/g) || [])];
    const suffixes = [...new Set(text.match(/\b0\d{7,9}\b/g) || [])];
    console.log('Numbers:', numbers, 'Suffixes:', suffixes);

    // Construir candidatos: ICCIDs completos + sufijos combinados con prefijos
    const allCandidates = [...numbers];
    for (const s of suffixes) {
      for (const p of KNOWN_PREFIXES) {
        allCandidates.push(p + s);
        allCandidates.push(p + s + '0');
        if (s.startsWith('0')) allCandidates.push(p + s.slice(1));
      }
    }
    // También sufijo directo (últimos 9 dígitos)
    for (const s of suffixes) allCandidates.push(s);

    console.log('Candidatos:', allCandidates.slice(0, 5), '...');

    const extracted = { serie: numbers[0] || null, linea: null, suffixes, numbers };

    // Lookup en Supabase
    resultEl.innerHTML = `<div class="processing"><div class="spinner"></div><p>Buscando en base de datos...</p></div>`;
    const sim = await lookupSIMMulti([...new Set(allCandidates)].slice(0, 20));

    showScanResult(resultEl, sim, extracted);
    if (sim || numbers.length || suffixes.length) {
      addToHistory(sim, extracted);
    }
  } catch(e) {
    resultEl.innerHTML = `<div class="result-card"><div class="result-not-found">❌ Error al procesar la imagen.<br><small>${e.message}</small></div></div>`;
  }
}

// ─── RENDER RESULT ───────────────────────
function showScanResult(el, sim, extracted) {
  if (sim) {
    el.innerHTML = buildResultCard(sim);
  } else {
    const serie = extracted.serie || (extracted.numbers||[])[0];
    const sufijo = (extracted.suffixes||[])[0];
    if (serie || sufijo) {
      el.innerHTML = `
        <div class="result-card">
          <div class="result-header">
            <div class="result-status warn"></div>
            <span>SIM no encontrada en DB</span>
            <span class="badge default">Sin registro</span>
          </div>
          <div class="result-body">
            ${serie ? `<div class="result-row"><span class="label">ICCID detectado</span><span class="value">${serie}</span></div>` : ''}
            ${sufijo ? `<div class="result-row"><span class="label">Sufijo detectado</span><span class="value">${sufijo}</span></div>` : ''}
          </div>
        </div>`;
    } else {
      el.innerHTML = `<div class="result-card"><div class="result-not-found">No se pudo detectar una SIM en la imagen.<br>Intentá con mejor iluminación o encuadre.</div></div>`;
    }
  }
}

function buildResultCard(sim) {
  const statusColors = {
    'ASIGNADA': 'ok', 'DISPONIBLE': 'ok', 'EXTRAVIADA': 'err',
    'ENVIO FALLIDO': 'err', 'TERMINAL DEVUELTA': 'warn', 'SIN INFORMACIÓN': 'warn'
  };
  const badgeClass = {
    'ASIGNADA':'asignada','DISPONIBLE':'disponible','EXTRAVIADA':'extraviada'
  }[sim.estado] || 'default';
  const dotClass = statusColors[sim.estado] || 'warn';

  return `
  <div class="result-card">
    <div class="result-header">
      <div class="result-status ${dotClass}"></div>
      <span>${sim.cuenta || 'SIM encontrada'}</span>
      <span class="badge ${badgeClass}">${sim.estado || '—'}</span>
    </div>
    <div class="result-body">
      ${sim.serie ? `<div class="result-row"><span class="label">Serie</span><span class="value">${sim.serie}</span></div>` : ''}
      ${sim.linea ? `<div class="result-row"><span class="label">Línea</span><span class="value">${sim.linea}</span></div>` : ''}
      ${sim.ubicacion ? `<div class="result-row"><span class="label">Ubicación</span><span class="value">${sim.ubicacion}</span></div>` : ''}
      ${sim.cuenta ? `<div class="result-row"><span class="label">Cuenta</span><span class="value">${sim.cuenta}</span></div>` : ''}
    </div>
  </div>`;
}

// ─── SEARCH ──────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const resultEl = document.getElementById('search-result');
  resultEl.innerHTML = `<div class="processing"><div class="spinner"></div><p>Buscando...</p></div>`;

  const sim = await lookupSIM(q);
  if (sim) {
    resultEl.innerHTML = buildResultCard(sim);
    addToHistory(sim, { serie: q });
  } else {
    resultEl.innerHTML = `<div class="result-card"><div class="result-not-found">No se encontró ninguna SIM con "<b>${q}</b>"</div></div>`;
  }
}

document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

// ─── HISTORY ─────────────────────────────
function getHistory() { try { return JSON.parse(localStorage.getItem('sim_history') || '[]'); } catch { return []; } }
function saveHistory(h) { localStorage.setItem('sim_history', JSON.stringify(h.slice(0, MAX_HISTORY))); }

function addToHistory(sim, extracted) {
  const h = getHistory();
  h.unshift({
    sim,
    extracted,
    ts: Date.now()
  });
  saveHistory(h);
  if (document.getElementById('pane-history').classList.contains('hidden') === false) renderHistory();
}

function clearHistory() {
  localStorage.removeItem('sim_history');
  renderHistory();
  showToast('Historial borrado', 'ok');
}

function renderHistory() {
  const h = getHistory();
  const el = document.getElementById('history-list');
  if (!h.length) {
    el.innerHTML = `<div class="history-empty">📭 Aún no escaneaste ninguna SIM.</div>`;
    return;
  }
  el.innerHTML = h.map(entry => {
    const sim = entry.sim;
    const ext = entry.extracted || {};
    const ts = new Date(entry.ts);
    const timeStr = ts.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'}) + ' · ' + ts.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
    const dotClass = sim ? ({
      'ASIGNADA':'var(--teal)','DISPONIBLE':'var(--blue)','EXTRAVIADA':'var(--red)',
      'ENVIO FALLIDO':'var(--red)','SIN INFORMACIÓN':'var(--amber)','TERMINAL DEVUELTA':'var(--amber)'
    }[sim.estado] || 'var(--text-muted)') : 'var(--text-muted)';
    const cuenta = sim?.cuenta || '—';
    const serie  = sim?.serie || ext.serie || ext.linea || 'Desconocida';
    return `
    <div class="history-item">
      <div class="history-dot" style="background:${dotClass}"></div>
      <div class="history-info">
        <div class="history-cuenta">${cuenta}</div>
        <div class="history-serie">${serie}</div>
      </div>
      <div class="history-time">${timeStr}</div>
    </div>`;
  }).join('');
}

// ─── UI HELPERS ──────────────────────────
function showScreen(name) {
  document.getElementById('screen-login').classList.toggle('hidden', name !== 'login');
  document.getElementById('screen-app').classList.toggle('hidden', name !== 'app');
}

function switchTab(tab) {
  ['scan','search','history'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('pane-'+t).classList.toggle('hidden', t!==tab);
  });
  if (tab === 'history') renderHistory();
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
}

let toastTimer;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── BOOT ────────────────────────────────
checkSession();
</script>
